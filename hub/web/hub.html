<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115; --panel:#181b21; --elevated:#232730; --line:#2c3340;
    --text:#f8fafc; --muted:#94a3b8; --faint:#5b6675;
    --p1:#818cf8; --p2:#c084fc; --accent:#6366f1;
    --ok:#10b981; --err:#ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:40px 20px;overflow-x:hidden}
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .glow{position:absolute;border-radius:50%;filter:blur(100px);opacity:.25}
  .g1{width:460px;height:460px;background:#6366f1;top:-160px;left:-120px}
  .g2{width:360px;height:360px;background:#c084fc;bottom:-140px;right:-100px}

  .wrap{position:relative;z-index:1;width:100%;max-width:680px;animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  header{text-align:center;margin-bottom:36px}
  .logo{width:72px;height:72px;margin:0 auto 18px;display:block;filter:drop-shadow(0 8px 22px rgba(99,102,241,.45))}
  h1{font-size:34px;font-weight:800;letter-spacing:-.02em;
     background:linear-gradient(135deg,var(--p1),var(--p2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  header p{margin-top:8px;color:var(--muted);font-size:15px}

  .apps{display:flex;flex-direction:column;gap:16px}
  .card{display:flex;align-items:center;gap:18px;text-align:left;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;
    font-family:inherit;color:inherit;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 16px 36px rgba(0,0,0,.35)}
  .card:disabled{cursor:default;opacity:.85;transform:none;box-shadow:none}
  .card__icon{flex-shrink:0;width:52px;height:52px;border-radius:13px;display:grid;place-items:center;
    background:linear-gradient(135deg,rgba(129,140,248,.22),rgba(192,132,252,.18));border:1px solid var(--line)}
  .card__body{flex:1;min-width:0}
  .card__title{font-size:17px;font-weight:600}
  .card__desc{margin-top:3px;font-size:13.5px;color:var(--muted);line-height:1.45}
  .card__state{margin-top:7px;font-size:12.5px;font-weight:500;min-height:16px}
  .card__state.installing,.card__state.starting{color:var(--p1)}
  .card__state.running{color:var(--ok)}
  .card__state.error{color:var(--err)}
  .card__go{flex-shrink:0;color:var(--faint);transition:transform .18s ease}
  .card:hover .card__go{transform:translateX(3px);color:var(--p1)}
  .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--p1);border-radius:50%;
    display:inline-block;vertical-align:-3px;margin-right:7px;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{margin-top:30px;text-align:center;color:var(--faint);font-size:12px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bg"><div class="glow g1"></div><div class="glow g2"></div></div>

<div class="wrap">
  <header>
    <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
          <stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/>
        </linearGradient>
      </defs>
      <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#lg)"/>
      <rect x="4" y="4" width="56" height="56" rx="16" fill="#000" fill-opacity="0.12"/>
      <circle cx="24" cy="24" r="6.5" fill="#fff" fill-opacity="0.95"/>
      <rect x="34" y="17.5" width="14" height="13" rx="3.5" fill="#fff" fill-opacity="0.95"/>
      <path d="M20 44l8-6 8 6 8-8" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95"/>
    </svg>
    <h1>Playground Tools</h1>
    <p>A home for the team's creative utilities. Pick one to open it.</p>
  </header>

  <div class="apps" id="apps"></div>

  <footer>Keep the Terminal window open while you work · runs entirely on your Mac</footer>
</div>

<script>
  const APPS = [
    {
      id: "universal-downloader",
      title: "Universal Downloader",
      desc: "Download videos from YouTube, TikTok, and Instagram.",
      icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c7d2fe" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l4-4m-4 4l-4-4M5 21h14"/></svg>'
    },
    {
      id: "asset-compressor",
      title: "Asset Compressor",
      desc: "Crop, compress, and export video as WebP, GIF, MOV, and PNG.",
      icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c7d2fe" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V5a1 1 0 011-1h3M16 4h3a1 1 0 011 1v3M20 16v3a1 1 0 01-1 1h-3M8 20H5a1 1 0 01-1-1v-3"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>'
    }
  ];

  const wrap = document.getElementById("apps");
  const polling = {};

  APPS.forEach(a => {
    const btn = document.createElement("button");
    btn.className = "card";
    btn.id = "card-" + a.id;
    btn.innerHTML = `
      <span class="card__icon">${a.icon}</span>
      <span class="card__body">
        <span class="card__title">${a.title}</span>
        <span class="card__desc">${a.desc}</span>
        <span class="card__state" id="state-${a.id}"></span>
      </span>
      <svg class="card__go" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
    btn.addEventListener("click", () => launch(a.id));
    wrap.appendChild(btn);
  });

  function setState(id, cls, text, spinning){
    const el = document.getElementById("state-" + id);
    el.className = "card__state " + (cls || "");
    el.innerHTML = (spinning ? '<span class="spin"></span>' : "") + (text || "");
  }

  async function launch(id){
    setState(id, "starting", "Starting…", true);
    try{
      await fetch("/launch/" + id, { method: "POST" });
    }catch(e){
      setState(id, "error", "The Terminal window is closed. Double-click YouTube Downloader to reopen it.");
      return;
    }
    if (polling[id]) clearInterval(polling[id]);
    polling[id] = setInterval(() => poll(id), 1000);
  }

  async function poll(id){
    try{
      const r = await fetch("/status/" + id);
      const s = await r.json();
      const spinning = (s.state === "installing" || s.state === "starting");
      setState(id, s.state, s.message || "", spinning);
      if (s.state === "running" || s.state === "error"){
        clearInterval(polling[id]);
        polling[id] = null;
      }
    }catch(e){ /* keep polling */ }
  }
</script>
</body>
</html>
